  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "ShuiYi 税易",
    "description": "Free bilingual tax guidance for international students in the US",
    "applicationCategory": "FinanceApplication",
    "operatingSystem": "Any",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
    "inLanguage": ["en", "zh"]
  }
  </script>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      { "@type": "Question", "name": "Do F-1 students need to file US taxes?", "acceptedAnswer": { "@type": "Answer", "text": "Yes. Every F-1 student must file Form 8843, even with zero income. If you earned money, you also file Form 1040-NR." } },
      { "@type": "Question", "name": "What is Form 8843?", "acceptedAnswer": { "@type": "Answer", "text": "A one-page IRS form that tells the government you're an exempt individual (student/scholar). It keeps your days from counting toward the Substantial Presence Test." } },
      { "@type": "Question", "name": "Can I get a FICA refund as an international student?", "acceptedAnswer": { "@type": "Answer", "text": "If your employer withheld Social Security and Medicare taxes during your first 5 years on an F-1, J-1, M-1, or Q-1 visa, you're owed that money back." } },
      { "@type": "Question", "name": "What's the difference between NRA and RA?", "acceptedAnswer": { "@type": "Answer", "text": "Nonresident Aliens (NRA) only pay tax on US income and file 1040-NR. Resident Aliens (RA) pay tax on worldwide income and file 1040 like US citizens. Most students are NRA for their first 5 years." } },
      { "@type": "Question", "name": "Does my country have a tax treaty with the US?", "acceptedAnswer": { "@type": "Answer", "text": "China, India, South Korea, Japan, and 10 other countries have student tax treaties. Chinese students can exempt $5,000/year." } }
    ]
  }
  </script>

  <!-- Print CSS -->
  <link rel="stylesheet" href="/styles/print.css" media="print">

  <style>
    /* Base styles */
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background-color: #FAFAF8;
      color: #1A1A1A;
      font-size: 1.125rem;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    html[lang="zh"] body,
    html[lang="zh"] .wizard-text {
      font-family: 'Noto Sans SC', 'Inter', system-ui, sans-serif;
      line-height: 1.8;
    }
    html[lang="zh"] h1, html[lang="zh"] h2, html[lang="zh"] h3 {
      font-family: 'Noto Sans SC', 'Inter', system-ui, sans-serif;
    }

    /* Wizard step transitions */
    .wizard-step-enter { animation: slideInRight 300ms ease forwards; }
    .wizard-step-exit { animation: slideOutLeft 300ms ease forwards; }
    .wizard-step-enter-back { animation: slideInLeft 300ms ease forwards; }
    .wizard-step-exit-back { animation: slideOutRight 300ms ease forwards; }

    @keyframes slideInRight {
      from { transform: translateX(40px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideOutLeft {
      from { transform: translateX(0); opacity: 1; }
      to { transform: translateX(-40px); opacity: 0; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-40px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideOutRight {
      from { transform: translateX(0); opacity: 1; }
      to { transform: translateX(40px); opacity: 0; }
    }

    /* Result card entrance */
    .result-enter {
      animation: resultAppear 400ms ease-out forwards;
    }
    @keyframes resultAppear {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    /* Checkmark bounce */
    .check-bounce {
      animation: checkBounce 200ms cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    @keyframes checkBounce {
      from { transform: scale(0); }
      to { transform: scale(1); }
    }

    /* Button interactions */
    .btn-primary:active, .btn-ghost:active { transform: scale(0.97); }
    .btn-primary {
      transition: all 150ms ease;
      min-width: 160px;
      cursor: pointer;
    }
    .btn-primary:hover {
      background-color: #1E7A52;
      box-shadow: 0 2px 8px rgba(45,159,111,0.3);
    }
    .btn-primary:focus-visible {
      outline: 3px solid #2D9F6F;
      outline-offset: 2px;
    }
    .btn-ghost {
      transition: all 150ms ease;
      min-width: 160px;
      cursor: pointer;
    }
    .btn-ghost:hover {
      background-color: #E8F5EE;
    }
    .btn-ghost:focus-visible {
      outline: 3px solid #2D9F6F;
      outline-offset: 2px;
    }

    /* Progress bar */
    .progress-fill {
      transition: width 400ms ease-out;
    }

    /* Option card */
    .option-card {
      transition: border-color 150ms ease, background-color 150ms ease;
      cursor: pointer;
    }
    .option-card:hover {
      border-color: #2D9F6F;
    }
    .option-card.selected {
      border-color: #2D9F6F;
      background-color: #E8F5EE;
    }

    /* Focus styles */
    input:focus-visible, select:focus-visible, textarea:focus-visible {
      outline: none;
      border-color: #2D9F6F;
      box-shadow: 0 0 0 2px #2D9F6F33;
    }

    /* Accordion */
    .accordion-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 300ms ease;
    }
    .accordion-content.open {
      max-height: 2000px;
    }

    /* Count-up animation placeholder */
    .count-up { font-variant-numeric: tabular-nums; }

    /* Dark mode — CSS custom properties, no !important needed */
    :root {
      --dm-bg: #FAFAF8;
      --dm-surface: #FFFFFF;
      --dm-panel: #FFFFFF;
      --dm-text: #1A1A1A;
      --dm-text-secondary: #4B5563;
      --dm-border: #E5E7EB;
      --dm-input-bg: #FFFFFF;
      --dm-card-selected-bg: #E8F5EE;
      --dm-disclaimer-bg: #F9FAFB;
      --dm-primary-light: #E8F5EE;
      --dm-hero-gradient: linear-gradient(135deg, #E8F5EE 0%, #FAFAF8 100%);
      --dm-result-gradient: linear-gradient(135deg, #E8F5EE, #FFFFFF);
    }
    html.dark {
      --dm-bg: #111111;
      --dm-surface: #1A1A1A;
      --dm-panel: #1F1F1F;
      --dm-text: #E5E7EB;
      --dm-text-secondary: #9CA3AF;
      --dm-border: #333333;
      --dm-input-bg: #1F1F1F;
      --dm-card-selected-bg: #1a3a2a;
      --dm-disclaimer-bg: #1A1A1A;
      --dm-primary-light: #1a3a2a;
      --dm-hero-gradient: linear-gradient(135deg, #0a2618 0%, #111111 100%);
      --dm-result-gradient: linear-gradient(135deg, #1a3a2a, #1F1F1F);
    }
    html.dark body { background-color: var(--dm-bg); color: var(--dm-text); }
    .bg-surface { background-color: var(--dm-surface); }
    .wizard-panel { background-color: var(--dm-panel); border-color: var(--dm-border); }
    .option-card { background-color: var(--dm-panel); border-color: var(--dm-border); }
    .option-card.selected { background-color: var(--dm-card-selected-bg); border-color: #2D9F6F; }
    .option-card:hover { border-color: #2D9F6F; }
    input, select, textarea { background-color: var(--dm-input-bg); color: var(--dm-text); border-color: var(--dm-border); }
    .text-text { color: var(--dm-text); }
    .text-text-secondary { color: var(--dm-text-secondary); }
    .disclaimer-banner { background-color: var(--dm-disclaimer-bg); }
    .landing-hero { background: var(--dm-hero-gradient); }
    .result-card-bg { background: var(--dm-result-gradient); }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      .wizard-step-enter, .wizard-step-exit, .wizard-step-enter-back, .wizard-step-exit-back,
      .result-enter, .check-bounce { animation: none !important; }
      .progress-fill, .option-card, .btn-primary, .btn-ghost, .accordion-content { transition: none !important; }
    }

    /* Focus visible for option cards */
    .option-card:focus-visible { outline: 3px solid #2D9F6F; outline-offset: 2px; }

    /* Validation error shake */
    .input-error { border-color: #DC2626 !important; box-shadow: 0 0 0 2px rgba(220,38,38,0.2) !important; }
    .shake { animation: shake 300ms ease; }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }
  </style>
</head>
