<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShuiYi 税易 — Tax Guide for International Students</title>
  <meta name="description" content="Free bilingual tax guidance for international students in the US. Determine your tax status, generate Form 8843, calculate treaty benefits.">

  <!-- Open Graph -->
  <meta property="og:title" content="ShuiYi 税易 — Tax Guide for International Students">
  <meta property="og:description" content="Free bilingual tax guidance. Know your status. Get your forms. Save money.">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="en_US">
  <meta property="og:locale:alternate" content="zh_CN">
  <meta property="og:image" content="https://shuiyi.pages.dev/assets/og-image.png">
  <meta property="og:image:width" content="1200">

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#2D9F6F">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="icon" href="/assets/favicon.ico" type="image/x-icon">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { DEFAULT: '#2D9F6F', dark: '#1E7A52', light: '#E8F5EE' },
            accent: { DEFAULT: '#F5A623', dark: '#D4891A' },
            bg: '#FAFAF8',
            surface: '#FFFFFF',
            text: { DEFAULT: '#1A1A1A', secondary: '#4B5563', muted: '#9CA3AF' },
            success: '#16A34A',
            warning: '#D97706',
            error: '#DC2626',
            border: { DEFAULT: '#E5E7EB', focus: '#2D9F6F' },
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            chinese: ['"Noto Sans SC"', 'Inter', 'system-ui', 'sans-serif'],
          },
          spacing: {
            '1': '4px', '2': '8px', '3': '12px', '4': '16px',
            '6': '24px', '8': '32px', '12': '48px', '16': '64px', '24': '96px',
          },
          fontSize: {
            'caption': ['0.875rem', { lineHeight: '1.5', letterSpacing: '0.01em' }],
            'body-sm': ['1rem', { lineHeight: '1.5', fontWeight: '500' }],
            'body': ['1.125rem', { lineHeight: '1.6' }],
            'h3': ['1.25rem', { lineHeight: '1.4', fontWeight: '600' }],
            'h2': ['1.5rem', { lineHeight: '1.3', fontWeight: '600' }],
            'h1': ['2rem', { lineHeight: '1.2', fontWeight: '700', letterSpacing: '-0.01em' }],
            'display': ['3rem', { lineHeight: '1.1', fontWeight: '800', letterSpacing: '-0.02em' }],
            'btn': ['1rem', { lineHeight: '1', fontWeight: '600', letterSpacing: '0.02em' }],
          },
          borderRadius: {
            'sharp': '8px',
            'medium': '6px',
            'soft': '12px',
            'pill': '9999px',
            'celebrate': '16px',
          },
          boxShadow: {
            'wizard': '0 2px 8px rgba(0,0,0,0.06), 0 0 1px rgba(0,0,0,0.08)',
            'btn-hover': '0 2px 8px rgba(45,159,111,0.3)',
          },
        },
      },
    }
  </script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js" integrity="sha384-ieG+IKD0d/ZPXyCBTMVAbqsQdns8QGJR/e26WMw7M4fkaI/rHcS/YIoi+ah9WGge" crossorigin="anonymous"></script>

  <!-- Print CSS -->
  <link rel="stylesheet" href="/styles/print.css" media="print">

  <style>
    /* Base styles */
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background-color: #FAFAF8;
      color: #1A1A1A;
      font-size: 1.125rem;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    html[lang="zh"] body,
    html[lang="zh"] .wizard-text {
      font-family: 'Noto Sans SC', 'Inter', system-ui, sans-serif;
      line-height: 1.8;
    }
    html[lang="zh"] h1, html[lang="zh"] h2, html[lang="zh"] h3 {
      font-family: 'Noto Sans SC', 'Inter', system-ui, sans-serif;
    }

    /* Wizard step transitions */
    .wizard-step-enter { animation: slideInRight 300ms ease forwards; }
    .wizard-step-exit { animation: slideOutLeft 300ms ease forwards; }
    .wizard-step-enter-back { animation: slideInLeft 300ms ease forwards; }
    .wizard-step-exit-back { animation: slideOutRight 300ms ease forwards; }

    @keyframes slideInRight {
      from { transform: translateX(40px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideOutLeft {
      from { transform: translateX(0); opacity: 1; }
      to { transform: translateX(-40px); opacity: 0; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-40px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideOutRight {
      from { transform: translateX(0); opacity: 1; }
      to { transform: translateX(40px); opacity: 0; }
    }

    /* Result card entrance */
    .result-enter {
      animation: resultAppear 400ms ease-out forwards;
    }
    @keyframes resultAppear {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    /* Checkmark bounce */
    .check-bounce {
      animation: checkBounce 200ms cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    @keyframes checkBounce {
      from { transform: scale(0); }
      to { transform: scale(1); }
    }

    /* Button interactions */
    .btn-primary:active, .btn-ghost:active { transform: scale(0.97); }
    .btn-primary {
      transition: all 150ms ease;
      min-width: 160px;
    }
    .btn-primary:hover {
      background-color: #1E7A52;
      box-shadow: 0 2px 8px rgba(45,159,111,0.3);
    }
    .btn-ghost {
      transition: all 150ms ease;
      min-width: 160px;
    }
    .btn-ghost:hover {
      background-color: #E8F5EE;
    }

    /* Progress bar */
    .progress-fill {
      transition: width 400ms ease-out;
    }

    /* Option card */
    .option-card {
      transition: border-color 150ms ease, background-color 150ms ease;
      cursor: pointer;
    }
    .option-card:hover {
      border-color: #2D9F6F;
    }
    .option-card.selected {
      border-color: #2D9F6F;
      background-color: #E8F5EE;
    }

    /* Focus styles */
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #2D9F6F;
      box-shadow: 0 0 0 2px #2D9F6F33;
    }

    /* Accordion */
    .accordion-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 300ms ease;
    }
    .accordion-content.open {
      max-height: 2000px;
    }

    /* Count-up animation placeholder */
    .count-up { font-variant-numeric: tabular-nums; }

    /* Dark mode */
    @media (prefers-color-scheme: dark) {
      html.dark body { background-color: #111111; color: #E5E7EB; }
      html.dark .bg-surface, html.dark .bg-white { background-color: #1A1A1A; }
    }
    html.dark body { background-color: #111111; color: #E5E7EB; }
    html.dark .bg-surface { background-color: #1A1A1A !important; }
    html.dark .wizard-panel { background-color: #1F1F1F !important; border-color: #333 !important; }
    html.dark .option-card { background-color: #1F1F1F !important; border-color: #333 !important; }
    html.dark .option-card.selected { background-color: #1a3a2a !important; border-color: #2D9F6F !important; }
    html.dark .option-card:hover { border-color: #2D9F6F !important; }
    html.dark input, html.dark select, html.dark textarea {
      background-color: #1F1F1F !important; color: #E5E7EB !important; border-color: #333 !important;
    }
    html.dark .text-text { color: #E5E7EB !important; }
    html.dark .text-text-secondary { color: #9CA3AF !important; }
    html.dark .disclaimer-banner { background-color: #1A1A1A !important; }
    html.dark .landing-hero { background: linear-gradient(135deg, #0a2618 0%, #111111 100%) !important; }
    html.dark .result-card-bg { background: linear-gradient(135deg, #1a3a2a, #1F1F1F) !important; }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      .wizard-step-enter, .wizard-step-exit, .wizard-step-enter-back, .wizard-step-exit-back,
      .result-enter, .check-bounce { animation: none !important; }
      .progress-fill, .option-card, .btn-primary, .btn-ghost, .accordion-content { transition: none !important; }
    }

    /* Focus visible for option cards */
    .option-card:focus-visible { outline: 3px solid #2D9F6F; outline-offset: 2px; }

    /* Validation error shake */
    .input-error { border-color: #DC2626 !important; box-shadow: 0 0 0 2px rgba(220,38,38,0.2) !important; }
    .shake { animation: shake 300ms ease; }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }
  </style>
</head>
<body class="min-h-screen flex flex-col">
  <a href="#app" class="sr-only focus:not-sr-only focus:absolute focus:top-2 focus:left-2 focus:bg-primary focus:text-white focus:px-4 focus:py-2 focus:rounded-pill focus:z-[999]">Skip to main content</a>

  <!-- Header -->
  <header class="w-full border-b border-border bg-surface sticky top-0 z-50">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 flex items-center justify-between h-14">
      <a href="#" id="header-logo" class="flex items-center gap-2 text-h3 font-bold text-primary no-underline">
        <i data-lucide="calculator" class="w-6 h-6"></i>
        <span>ShuiYi <span class="font-chinese">税易</span></span>
      </a>
      <div class="flex items-center gap-3">
        <!-- Dark mode toggle -->
        <button id="dark-toggle" class="p-2.5 rounded-pill hover:bg-primary-light text-text-secondary min-w-[44px] min-h-[44px] flex items-center justify-center" aria-label="Toggle dark mode">
          <i data-lucide="moon" class="w-5 h-5"></i>
        </button>
        <!-- Language toggle -->
        <button id="lang-toggle" class="flex items-center gap-1 px-3 py-2.5 rounded-pill border border-border text-body-sm text-text-secondary hover:bg-primary-light min-h-[44px]" aria-label="Switch language">
          <i data-lucide="globe" class="w-4 h-4"></i>
          <span id="lang-label">中文</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Main content -->
  <main id="app" class="flex-1">
    <!-- Content rendered by app.ts -->
  </main>

  <!-- Footer -->
  <footer class="w-full border-t border-border bg-surface mt-16">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 py-8">
      <div class="disclaimer-banner bg-[#F9FAFB] border-l-[3px] border-text-muted p-4 rounded-r-medium mb-6">
        <div class="flex items-start gap-2">
          <i data-lucide="info" class="w-4 h-4 text-text-muted mt-0.5 flex-shrink-0"></i>
          <p id="footer-disclaimer" class="text-caption text-text-muted">
            For informational purposes only. This is not tax advice. Consult a qualified tax professional for your specific situation.
          </p>
        </div>
      </div>
      <div class="flex flex-col sm:flex-row items-center justify-between gap-4 text-caption text-text-muted">
        <p id="footer-sources">Sources: <a href="https://www.irs.gov/individuals/international-taxpayers" class="text-primary hover:underline" target="_blank" rel="noopener">IRS.gov</a> &middot; <a href="https://www.irs.gov/publications/p901" class="text-primary hover:underline" target="_blank" rel="noopener">Publication 901</a> &middot; <a href="https://www.irs.gov/publications/p519" class="text-primary hover:underline" target="_blank" rel="noopener">Publication 519</a></p>
        <p>&copy; 2026 ShuiYi. <span id="footer-free">Free and open source.</span></p>
      </div>
    </div>
  </footer>

  <!-- App bundle -->
  <script type="module" src="/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
